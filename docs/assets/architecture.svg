<svg xmlns="http://www.w3.org/2000/svg" style="background:#0a0e1a" viewBox="0 0 1180 600" role="img" aria-label="Horizontal flow of the Virtual Biotech CSO target identification and validation loop, with a re-route loop from the Scientific Reviewer back to the orchestrator">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrLoop" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#fbbf24" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { fill:#e2e8f0; }
      .disp  { font-family:'Space Grotesk',sans-serif; font-weight:600; }
      .body  { font-family:'Inter',sans-serif; }
      .mono  { font-family:'JetBrains Mono',monospace; }
      .dim   { fill:#94a3b8; }
      .faint { fill:#64748b; }
      .node  { fill:#0f1729; stroke:#243049; stroke-width:1.2; }
      .flow  { fill:none; stroke:#64748b; stroke-width:1.5; }
    </style>
  </defs>

  <!-- ================= MAIN HORIZONTAL FLOW (y ≈ 150) ================= -->

  <!-- Input query -->
  <rect class="node" x="34" y="116" width="118" height="74" rx="11"/>
  <text x="93" y="142" class="mono faint" font-size="9.5" text-anchor="middle">INPUT QUERY</text>
  <text x="93" y="162" class="body" font-size="10.5" text-anchor="middle">“Assess B7-H3</text>
  <text x="93" y="176" class="body" font-size="10.5" text-anchor="middle">in lung cancer”</text>

  <line class="flow" x1="152" y1="153" x2="196" y2="153" marker-end="url(#arr)"/>

  <!-- CSO orchestrator (entry) -->
  <rect class="node" x="198" y="118" width="120" height="70" rx="11" stroke="#34d399" stroke-opacity="0.5"/>
  <circle cx="228" cy="143" r="9" fill="none" stroke="#34d399" stroke-width="1.4"/>
  <circle cx="228" cy="143" r="3" fill="#34d399"/>
  <text x="246" y="139" class="disp" font-size="12.5">CSO</text>
  <text x="246" y="153" class="dim body" font-size="8.5">orchestrator</text>
  <text x="258" y="178" class="faint mono" font-size="8" text-anchor="middle">clarify · plan · route</text>

  <!-- Chief of Staff (above) + planning (below), light side roles -->
  <line class="flow" x1="318" y1="140" x2="360" y2="96"  marker-end="url(#arr)"/>
  <line class="flow" x1="318" y1="166" x2="360" y2="210" marker-end="url(#arr)"/>
  <rect class="node" x="362" y="70" width="150" height="50" rx="10"/>
  <text x="437" y="90"  class="disp" font-size="11" text-anchor="middle">Chief of Staff</text>
  <text x="437" y="106" class="faint body" font-size="8.5" text-anchor="middle">intelligence scouting · briefing</text>
  <rect class="node" x="362" y="186" width="150" height="50" rx="10"/>
  <text x="437" y="206" class="disp" font-size="11" text-anchor="middle">Planning</text>
  <text x="437" y="222" class="faint body" font-size="8.5" text-anchor="middle">decompose · scientist routing</text>

  <!-- back into CSO router -->
  <line class="flow" x1="512" y1="96"  x2="556" y2="140" marker-end="url(#arr)"/>
  <line class="flow" x1="512" y1="210" x2="556" y2="166" marker-end="url(#arr)"/>
  <rect class="node" x="558" y="124" width="58" height="58" rx="11" stroke="#34d399" stroke-opacity="0.5"/>
  <circle cx="587" cy="148" r="9" fill="none" stroke="#34d399" stroke-width="1.4"/>
  <circle cx="587" cy="148" r="3" fill="#34d399"/>
  <text x="587" y="174" class="disp" font-size="10" text-anchor="middle">CSO</text>

  <!-- fan-out to four divisions -->
  <path class="flow" d="M616 153 H648" marker-end="url(#arr)"/>
  <line class="flow" x1="648" y1="153" x2="648" y2="73"/>
  <line class="flow" x1="648" y1="153" x2="648" y2="233"/>
  <path class="flow" d="M648 73  H690" marker-end="url(#arr)"/>
  <path class="flow" d="M648 126 H690" marker-end="url(#arr)"/>
  <path class="flow" d="M648 180 H690" marker-end="url(#arr)"/>
  <path class="flow" d="M648 233 H690" marker-end="url(#arr)"/>

  <!-- four division pills, colour-keyed, light — title line + caption line, no overlap -->
  <g>
    <rect class="node" x="692" y="52" width="200" height="40" rx="9"/>
    <rect x="700" y="64" width="6" height="16" rx="3" fill="#34d399"/>
    <text x="716" y="72" class="disp" font-size="10.5">Target ID</text>
    <text x="716" y="84" class="faint mono" font-size="7.5">genetics · scRNA · dependency</text>

    <rect class="node" x="692" y="106" width="200" height="40" rx="9"/>
    <rect x="700" y="118" width="6" height="16" rx="3" fill="#38bdf8"/>
    <text x="716" y="126" class="disp" font-size="10.5">Target Safety</text>
    <text x="716" y="138" class="faint mono" font-size="7.5">off-target · mouse-KO · FAERS</text>

    <rect class="node" x="692" y="160" width="200" height="40" rx="9"/>
    <rect x="700" y="172" width="6" height="16" rx="3" fill="#38bdf8"/>
    <text x="716" y="180" class="disp" font-size="10.5">Modality &amp; Tractability</text>
    <text x="716" y="192" class="faint mono" font-size="7.5">druggability · structure</text>

    <rect class="node" x="692" y="214" width="200" height="40" rx="9"/>
    <rect x="700" y="226" width="6" height="16" rx="3" fill="#fbbf24"/>
    <text x="716" y="234" class="disp" font-size="10.5">Clinical &amp; Literature</text>
    <text x="716" y="246" class="faint mono" font-size="7.5">trials · live web</text>
  </g>

  <!-- divisions -> reviewer (merge) -->
  <line class="flow" x1="892" y1="72"  x2="924" y2="72"/>
  <line class="flow" x1="892" y1="126" x2="924" y2="126"/>
  <line class="flow" x1="892" y1="180" x2="924" y2="180"/>
  <line class="flow" x1="892" y1="234" x2="924" y2="234"/>
  <line class="flow" x1="924" y1="72"  x2="924" y2="234"/>
  <path class="flow" d="M924 153 H952" marker-end="url(#arr)"/>

  <!-- Scientific Reviewer -->
  <rect class="node" x="954" y="120" width="92" height="66" rx="11" stroke="#fbbf24" stroke-opacity="0.55"/>
  <circle cx="1000" cy="143" r="9" fill="none" stroke="#fbbf24" stroke-width="1.4"/>
  <text x="1000" y="170" class="disp" font-size="10" text-anchor="middle">Reviewer</text>
  <text x="1000" y="106" class="faint body" font-size="8.5" text-anchor="middle">completeness · methodology</text>

  <!-- Reviewer -> CSO synthesis -->
  <path class="flow" d="M1046 153 H1058" marker-end="url(#arr)"/>
  <rect class="node" x="1060" y="124" width="56" height="58" rx="11" stroke="#34d399" stroke-opacity="0.5"/>
  <circle cx="1088" cy="148" r="9" fill="none" stroke="#34d399" stroke-width="1.4"/>
  <circle cx="1088" cy="148" r="3" fill="#34d399"/>
  <text x="1088" y="174" class="disp" font-size="10" text-anchor="middle">CSO</text>
  <text x="1088" y="112" class="faint body" font-size="8.5" text-anchor="middle">synthesis</text>

  <!-- CSO -> Report -->
  <path class="flow" d="M1116 153 H1128" marker-end="url(#arr)"/>
  <rect class="node" x="1130" y="126" width="44" height="54" rx="9" stroke="#34d399" stroke-opacity="0.4"/>
  <circle cx="1152" cy="145" r="5" fill="#fbbf24"/>
  <text x="1152" y="169" class="disp" font-size="8" text-anchor="middle">GO /</text>
  <text x="1152" y="178" class="disp" font-size="8" text-anchor="middle">NO-GO</text>

  <!-- ================= THE RE-ROUTE LOOP (single clean arc beneath) ================= -->
  <path d="M1000 186 C 1000 300 760 300 587 300 C 440 300 320 300 250 300 L250 188"
        fill="none" stroke="#fbbf24" stroke-width="1.7" stroke-dasharray="6 5"
        marker-end="url(#arrLoop)"/>
  <rect x="470" y="288" width="234" height="24" rx="12" fill="#0c1322" stroke="#fbbf24" stroke-opacity="0.35"/>
  <text x="587" y="304" class="mono" font-size="10" fill="#fbbf24" text-anchor="middle">re-route to fill missing gaps</text>

  <!-- ================= LIGHT SUPPORTING RAILS (no dense grids) ================= -->
  <!-- Rail 1: tools / databases the divisions call -->
  <line x1="40" y1="372" x2="1160" y2="372" stroke="#1e293b" stroke-width="1"/>
  <circle cx="48" cy="396" r="3.5" fill="#38bdf8"/>
  <text x="62" y="400" class="disp" font-size="11.5">Expert tools over real databases</text>
  <text x="320" y="400" class="body dim" font-size="10">— each division calls deterministic ClawBio skills; nothing in a verdict is ungrounded.</text>
  <text x="62" y="422" class="mono dim" font-size="10">Open Targets · CELLxGENE Census · TCGA/GDC · DepMap CRISPR · GWAS Catalog · openFDA/FAERS · ClinicalTrials.gov · Tavily web</text>
  <text x="62" y="440" class="mono faint" font-size="9.5">validation:  τ-specificity · malignant-cell localisation · structure  ·  CRISPR dependency · mouse-KO · trial outcomes</text>

  <!-- Rail 2: verifiability store -->
  <line x1="40" y1="466" x2="1160" y2="466" stroke="#1e293b" stroke-width="1"/>
  <circle cx="48" cy="490" r="3.5" fill="#fbbf24"/>
  <text x="62" y="494" class="disp" font-size="11.5">Verifiable reasoning store</text>
  <text x="270" y="494" class="body dim" font-size="10">— every result is recorded, then the verdict is derived deductively and replayed.</text>

  <g>
    <rect class="node" x="62" y="508" width="346" height="64" rx="10" stroke="#34d399" stroke-opacity="0.3"/>
    <text x="80" y="530" class="disp" font-size="11">Canonical knowledge graph</text>
    <text x="80" y="546" class="mono faint" font-size="8.5">kg.py · kg.json</text>
    <text x="80" y="563" class="body dim" font-size="9.5">claims live on cited edges — grade, source, URL, step</text>

    <rect class="node" x="418" y="508" width="346" height="64" rx="10" stroke="#fbbf24" stroke-opacity="0.35"/>
    <text x="436" y="530" class="disp" font-size="11">Vadalog reasoning engine</text>
    <text x="436" y="546" class="mono faint" font-size="8.5">prometheux_reason.py · Prometheux</text>
    <text x="436" y="563" class="body dim" font-size="9.5">derives the GO/NO-GO tier with @explain rule chains</text>

    <rect class="node" x="774" y="508" width="346" height="64" rx="10" stroke="#38bdf8" stroke-opacity="0.3"/>
    <text x="792" y="530" class="disp" font-size="11">Execution trace</text>
    <text x="792" y="546" class="mono faint" font-size="8.5">tracing.py · trace.jsonl → Langfuse (opt.)</text>
    <text x="792" y="563" class="body dim" font-size="9.5">every span replayable — the run is inspectable, not just the result</text>
  </g>
</svg>